<app-home></app-home>

<div class="flex flex-col">
    <h2 class=" m-2 p-2 text-3xl font-bold text-blue-800">Reservation List</h2>
    <ul class="m-2 p-2" *ngIf="reservations.length; else noReservation">
        <li class="bg-blue-200 p-3" *ngFor="let reservation of reservations">
            Guest : {{reservation.guestName}} <br/>
            Email : {{reservation.guestEmail}} <br/>
            Room No. : {{reservation.roomNumber}} <br/>
            Check-In : {{reservation.checkInDate}} <br/>
            Check-Out : {{reservation.checkOutDate}} <br/>
            <button class="bg-yellow-500 hover:bg-yellow-400 text-white border-white border-2 rounded-md w-1/8 m-3 p-2 cursor-pointer" [routerLink]="['/edit',reservation.id]">Edit</button>
            <button class="bg-red-600 hover:bg-red-500 text-white border-white border-2 rounded-md w-1/8 m-3 p-2 cursor-pointer" (click)="deleteReservation(reservation.id)">Delete</button>
        </li>
    </ul>
</div>

<div>
    <button class="bg-blue-600 text-white hover:bg-blue-500 border-2 border-white m-2 p-1 w-1/7 rounded-md cursor-pointer" (click)="back()">Back</button>
</div>


<ng-template #noReservation> <!-- ngTemplate rendered only when no reservation -->
    <p class="bg-blue-200 m-2 p-2">No reservation available</p>
</ng-template>
